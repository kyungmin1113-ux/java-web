<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>League of Legends - 회원가입</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/search.css">

</head>

<body>

    <!-- 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container-fluid">

            <!-- 로고 -->
            <a class="navbar-brand" href="/">

                <img src="/image/Logo.jpg"
                     alt="logo"
                     width="30"
                     height="24">

            </a>

            <!-- 다크모드 버튼 -->
            <button class="btn border-0 text-white"
                    id="themeToggleBtn"
                    onclick="toggleTheme()">

                DARK

            </button>

            <!-- 메뉴 -->
            <div class="collapse navbar-collapse show">

                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">

                    <li class="nav-item">

                        <a class="nav-link active"
                           href="/">

                            메인화면

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link active"
                           href="#">

                            뉴스

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link active"
                           href="/main_page_sub/champion.html">

                            챔피언

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link active"
                           href="/main_page_sub/download.html">

                            다운로드

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link active"
                           href="/login">

                            로그인

                        </a>

                    </li>

                    <!-- 드롭다운 -->
                    <li class="nav-item dropdown">

                        <a class="nav-link dropdown-toggle"
                           href="#"
                           role="button"
                           data-bs-toggle="dropdown">

                            외부웹사이트

                        </a>

                        <ul class="dropdown-menu">

                            <li>

                                <a class="dropdown-item"
                                   href="https://www.leagueoflegends.com/ko-kr/"
                                   target="_blank">

                                    롤 공식홈

                                </a>

                            </li>

                            <li>

                                <a class="dropdown-item"
                                   href="https://lol.ps/"
                                   target="_blank">

                                    롤 전적

                                </a>

                            </li>

                            <li>
                                <hr class="dropdown-divider">
                            </li>

                            <li>

                                <a class="dropdown-item"
                                   href="https://www.youtube.com/results?search_query=%EB%A1%A4"
                                   target="_blank">

                                    관련 유튜브

                                </a>

                            </li>

                        </ul>

                    </li>

                </ul>

                <!-- 검색 -->
                <form class="d-flex"
                      id="searchForm">

                    <input class="form-control me-2"
                           type="search"
                           placeholder="Search"
                           id="searchInput">

                    <button class="btn btn-outline-success"
                            type="submit">

                        Search

                    </button>

                </form>

            </div>

        </div>

    </nav>


    <!-- 회원가입 영역 -->
    <section class="hero d-flex align-items-center justify-content-center py-5">

        <div class="container"
             style="max-width: 500px;">

            <div class="card shadow p-4">

                <h2 class="fw-bold text-center mb-4">

                    회원가입

                </h2>

                <form id="registerForm"
                      action="/register_check"
                      method="post">

                    <!-- 아이디 -->
                    <div class="mb-3">

                        <label class="form-label">

                            아이디 *

                        </label>

                        <input type="text"
                               class="form-control"
                               id="username"
                               name="username"
                               placeholder="4~20자 영문/숫자"
                               required>

                        <div class="invalid-feedback"
                             id="usernameMsg">
                        </div>

                    </div>


                    <!-- 패스워드 -->
                    <div class="mb-3">

                        <label class="form-label">

                            패스워드 *

                        </label>

                        <input type="password"
                               class="form-control"
                               id="password"
                               placeholder="8자 이상 입력"
                               required>

                        <div class="invalid-feedback"
                             id="passwordMsg">
                        </div>

                    </div>


                    <!-- 패스워드 확인 -->
                    <div class="mb-3">

                        <label class="form-label">

                            패스워드 확인 *

                        </label>

                        <input type="password"
                               class="form-control"
                               id="passwordConfirm"
                               placeholder="패스워드 재입력"
                               required>

                        <div class="invalid-feedback"
                             id="passwordConfirmMsg">
                        </div>

                    </div>


                    <!-- 이메일 -->
                    <div class="mb-3">

                        <label class="form-label">

                            이메일 *

                        </label>

                        <input type="email"
                               class="form-control"
                               id="email"
                               name="email"
                               placeholder="example@email.com"
                               required>

                        <div class="invalid-feedback"
                             id="emailMsg">
                        </div>

                    </div>


                    <!-- 연락처 -->
                    <div class="mb-4">

                        <label class="form-label">

                            연락처 *

                        </label>

                        <input type="text"
                               class="form-control"
                               id="phone"
                               name="phone"
                               placeholder="010-0000-0000"
                               required>

                        <div class="invalid-feedback"
                             id="phoneMsg">
                        </div>

                    </div>


                    <!-- 암호화 비밀번호 저장 -->
                    <input type="hidden"
                           id="hashedPassword"
                           name="password">


                    <!-- 회원가입 버튼 -->
                    <button type="button"
                            class="btn btn-primary w-100"
                            onclick="validateAndShowModal()">

                        회원가입

                    </button>

                </form>

            </div>

        </div>

    </section>


    <!-- Bootstrap JS -->
    <script src="/js/bootstrap.bundle.min.js"></script>

    <!-- 검색 -->
    <script src="/js/search.js"></script>

    <!-- 다크모드 -->
    <script src="/js/toggle.js"></script>

    <!-- 회원가입 검증 -->
    <script src="/js/input_check.js"></script>
    <script src="/js/input_sha256.js"></script>

</body>

</html>
